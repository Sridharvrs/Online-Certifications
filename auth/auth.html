<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Authentication</title>
</head>
<body>

  <div class="auth-modal hidden" id="authModal">

    <div class="auth-box">

      <button class="auth-close" id="authClose">×</button>

      <div class="auth-tabs">
        <button class="tab active" data-tab="login">Login</button>
        <button class="tab" data-tab="signup">Sign Up</button>
      </div>

      <div class="auth-form active" id="login">

        <h2>Welcome Back</h2>

        <input type="email" placeholder="Email" id="loginEmail">

        <div class="password-field">
          <input type="password" placeholder="Password" id="loginPassword">
          <span class="eye" data-eye="loginPassword">👁</span>
        </div>

        <select id="loginRole">
          <option value="user">User</option>
          <option value="admin">Admin</option>
        </select>

        <div class="password-hint" id="loginHint"></div>

        <div class="row">
          <label class="remember-label">
            <input type="checkbox" id="rememberMe"> Remember me
          </label>
          <a href="error">Forgot Password?</a>
        </div>

        <button class="btn-auth" id="loginBtn" type="button">Login</button>

        <div class="divider">OR</div>
        
        <button onclick="window.location.href='error.html'" class="google-btn">
          Continue with Google
        </button>

      </div>

      <div class="auth-form" id="signup">

        <h2>Create Account</h2>

        <input type="text" placeholder="Full Name" id="signupName" oninput="this.value = this.value.replace(/[^a-zA-Z\s]/g,'')">
        <input type="email" placeholder="Email" id="signupEmail">

        <div class="password-field">
          <input type="password" placeholder="Password" id="signupPassword">
          <span class="eye" data-eye="signupPassword">👁</span>
        </div>

        <div class="password-field">
          <input type="password" placeholder="Confirm Password" id="signupConfirm">
          <span class="eye" data-eye="signupConfirm">👁</span>
        </div>

        <select id="signupRole">
          <option value="user">User</option>
          <option value="admin">Admin</option>
        </select>

        <div class="password-hint" id="signupHint"></div>

        <button class="btn-auth">Sign Up</button>

      </div>

    </div>
  </div>
  
  <script src="auth.js"></script>
</body>
</html>
